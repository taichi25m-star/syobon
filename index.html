<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Syobon Web</title>

<style>
body{
margin:0;
overflow:hidden;
background:#87CEEB;
font-family:sans-serif;
}

canvas{
display:block;
margin:auto;
}

#ui{
position:absolute;
left:20px;
top:10px;
font-size:24px;
color:white;
}
</style>

</head>

<body>

<div id="ui">Deaths: 0</div>

<canvas id="game" width="900" height="450"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");

let gravity = 0.8;
let deaths = 0;

let player={
x:100,
y:300,
w:30,
h:30,
vx:0,
vy:0,
jump:false
};

let camera=0;
let keys={};

document.addEventListener("keydown",e=>{
keys[e.key]=true;
});

document.addEventListener("keyup",e=>{
keys[e.key]=false;
});

let blocks=[
{x:0,y:380,w:2000,h:70},

{x:300,y:330,w:100,h:20},
{x:450,y:300,w:100,h:20},

// 偽ブロック
{x:650,y:330,w:100,h:20,fake:true},

// 落ちる床
{x:850,y:300,w:100,h:20,fall:true,vy:0}
];

let spikes=[
{x:520,y:360,w:30,h:20},

// 隠しトゲ
{x:720,y:360,w:30,h:20,hidden:true}
];

function death(){

deaths++;
ui.innerText="Deaths: "+deaths;

player.x=100;
player.y=300;
player.vx=0;
player.vy=0;

}

function update(){

if(keys["ArrowLeft"]) player.vx=-5;
else if(keys["ArrowRight"]) player.vx=5;
else player.vx=0;

if(keys["ArrowUp"]&&!player.jump){
player.vy=-13;
player.jump=true;
}

player.vy+=gravity;

player.x+=player.vx;
player.y+=player.vy;

for(let b of blocks){

if(b.fake) continue;

if(player.x < b.x+b.w &&
player.x+player.w > b.x &&
player.y+player.h > b.y &&
player.y+player.h < b.y+20){

player.y=b.y-player.h;
player.vy=0;
player.jump=false;

if(b.fall){
b.vy=5;
}

}

if(b.fall){
b.y+=b.vy;
}

}

for(let s of spikes){

if(s.hidden && player.x>650){
s.hidden=false;
}

if(player.x < s.x+s.w &&
player.x+player.w > s.x &&
player.y < s.y+s.h &&
player.y+player.h > s.y){

death();

}

}

camera=player.x-200;

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.save();
ctx.translate(-camera,0);

// ブロック
ctx.fillStyle="brown";

for(let b of blocks){

ctx.fillRect(b.x,b.y,b.w,b.h);

}

// トゲ
ctx.fillStyle="red";

for(let s of spikes){

if(s.hidden) continue;

ctx.beginPath();
ctx.moveTo(s.x,s.y+s.h);
ctx.lineTo(s.x+s.w/2,s.y);
ctx.lineTo(s.x+s.w,s.y+s.h);
ctx.fill();

}

// しょぼん（顔）
ctx.fillStyle="white";
ctx.fillRect(player.x,player.y,player.w,player.h);

ctx.fillStyle="black";
ctx.fillRect(player.x+5,player.y+8,5,5);
ctx.fillRect(player.x+20,player.y+8,5,5);

ctx.beginPath();
ctx.arc(player.x+15,player.y+20,5,0,Math.PI);
ctx.stroke();

ctx.restore();

}

function loop(){

update();
draw();
requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
