<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Syobon Web</title>

<style>

body{
margin:0;
overflow:hidden;
}

canvas{
display:block;
margin:auto;
}

#ui{
position:absolute;
left:20px;
top:10px;
color:white;
font-size:24px;
}

</style>

</head>

<body>

<div id="ui">Deaths:0</div>

<canvas id="game" width="900" height="450"></canvas>

<audio id="bgm" src="bgm/field.ogg" loop></audio>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")
const ui=document.getElementById("ui")
const bgm=document.getElementById("bgm")

let jumpSound=new Audio("se/jump.ogg")
let deathSound=new Audio("se/death.ogg")
let goalSound=new Audio("se/goal.ogg")

let playerImg=new Image()
playerImg.src="img/player.PNG"

let enemyImg=new Image()
enemyImg.src="img/teki.PNG"

let blockImg=new Image()
blockImg.src="img/brock.PNG"

let bgImg=new Image()
bgImg.src="img/haikei.PNG"

let gravity=0.8
let deaths=0

let player={
x:100,
y:300,
w:32,
h:32,
vx:0,
vy:0,
jump:false
}

let camera=0
let keys={}

document.addEventListener("keydown",e=>{

keys[e.key]=true
bgm.play()

})

document.addEventListener("keyup",e=>{

keys[e.key]=false

})

let blocks=[

{x:0,y:380,w:3000,h:70},

{x:300,y:330,w:100,h:20},
{x:450,y:300,w:100,h:20},
{x:650,y:330,w:100,h:20},

{x:900,y:300,w:100,h:20},
{x:1100,y:280,w:100,h:20},
{x:1300,y:330,w:100,h:20}

]

let spikes=[

{x:520,y:360,w:30,h:20},
{x:550,y:360,w:30,h:20},

{x:1000,y:360,w:30,h:20}

]

let enemy={

x:1200,
y:300,
w:32,
h:32,
dir:1

}

let goal={

x:1700,
y:300,
w:40,
h:80

}

function death(){

deaths++

ui.innerText="Deaths:"+deaths

deathSound.play()

player.x=100
player.y=300
player.vx=0
player.vy=0

}

function update(){

if(keys["ArrowLeft"]) player.vx=-5
else if(keys["ArrowRight"]) player.vx=5
else player.vx=0

if(keys["ArrowUp"]&&!player.jump){

player.vy=-13
player.jump=true

jumpSound.play()

}

player.vy+=gravity

player.x+=player.vx
player.y+=player.vy

for(let b of blocks){

if(player.x<b.x+b.w &&
player.x+player.w>b.x &&
player.y+player.h>b.y &&
player.y+player.h<b.y+20){

player.y=b.y-player.h
player.vy=0
player.jump=false

}

}

for(let s of spikes){

if(player.x<s.x+s.w &&
player.x+player.w>s.x &&
player.y<s.y+s.h &&
player.y+player.h>s.y){

death()

}

}

enemy.x+=enemy.dir*2

if(enemy.x>1300||enemy.x<1100) enemy.dir*=-1

if(player.x<enemy.x+enemy.w &&
player.x+player.w>enemy.x &&
player.y<enemy.y+enemy.h &&
player.y+player.h>enemy.y){

death()

}

if(player.x>goal.x){

goalSound.play()

alert("CLEAR!")

player.x=100

}

camera=player.x-200

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(bgImg,camera,0,900,450)

ctx.save()

ctx.translate(-camera,0)

for(let b of blocks){

ctx.drawImage(blockImg,b.x,b.y,b.w,b.h)

}

ctx.fillStyle="red"

for(let s of spikes){

ctx.beginPath()

ctx.moveTo(s.x,s.y+s.h)
ctx.lineTo(s.x+s.w/2,s.y)
ctx.lineTo(s.x+s.w,s.y+s.h)

ctx.fill()

}

ctx.drawImage(enemyImg,enemy.x,enemy.y,enemy.w,enemy.h)

ctx.fillStyle="black"

ctx.fillRect(goal.x,goal.y,goal.w,goal.h)

ctx.fillStyle="yellow"

ctx.fillRect(goal.x+40,goal.y,40,20)

ctx.drawImage(playerImg,player.x,player.y,player.w,player.h)

ctx.restore()

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
